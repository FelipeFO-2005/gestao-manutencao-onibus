<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>TCGL</title>
    <link rel="icon" href="assets/images/logo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="topo">

    <img src="assets/images/logo.png" alt="Logo TCGL" class="logo">
    
    <h1 class="titulo">Controle de Oficina</h1>

    <button id="toggleFormBtn" type="button" class="btn-eye">
        👁
    </button>

</header>


<div class="conteudo">

<!-- Formulário -->
<form id="form">

    <input type="number" placeholder="Prefixo" id="prefixo" required>

    <input type="text" placeholder="Responsável" id="responsavel" required>

    <input type="text" placeholder="Serviço" id="servico" required>

    <select id="status">
        <option>Aguardando</option>
        <option>Em manutenção</option>
        <option>Finalizado</option>
    </select>

    <button class="btn-add">Adicionar</button>

</form>


<!-- Tabela -->
<table>

    <thead>
        <tr>
            <th>Prefixo</th>
            <th>Responsável</th>
            <th>Serviço</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody id="tabela"></tbody>

</table>


<!-- Paginação -->
<div class="paginacao">

    <button onclick="paginaAnterior()">⬅ Anterior</button>

    <span id="pagina"></span>

    <button onclick="proximaPagina()">Próxima ➡</button>

</div>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
